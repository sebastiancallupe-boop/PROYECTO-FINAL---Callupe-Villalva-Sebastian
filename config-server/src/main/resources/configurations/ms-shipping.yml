server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rapidocourier_db
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    instances:
      customerServiceCB:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        slidingWindowSize: 5
  retry:
    instances:
      customerServiceRetry:
        maxAttempts: 3
        waitDuration: 500ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,refresh
  endpoint:
    health:
      show-details: always
